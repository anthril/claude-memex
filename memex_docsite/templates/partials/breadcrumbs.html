{% if breadcrumbs and breadcrumbs | length > 1 %}
<nav class="breadcrumbs" aria-label="Breadcrumb">
  <ol>
    {% for crumb in breadcrumbs %}
      <li>
        {% if not loop.last %}
          <a href="{{ crumb.url }}">{{ crumb.label }}</a>
          <span class="sep" aria-hidden="true">›</span>
        {% else %}
          <a href="{{ crumb.url }}">{{ crumb.label }}</a>
        {% endif %}
      </li>
    {% endfor %}
  </ol>
</nav>
{% endif %}
